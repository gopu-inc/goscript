name: Goscript CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**.gjs'
      - '**.gos'
      - 'src/**'
      - 'lib/**'
      - 'goscript.toml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.gjs'
      - '**.gos'
      - 'src/**'
      - 'lib/**'

env:
  GOSCRIPT_VERSION: "1.0.0"
  GENV_VERSION: "2.0.0"

jobs:
  # ============================================
  # JOB 1: Build Goscript sur multiples plateformes
  # ============================================
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: goscript-linux
            asset_name: goscript-linux-amd64
          - os: macos-latest
            artifact_name: goscript-macos
            asset_name: goscript-macos-amd64

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            flex \
            bison \
            libffi-dev \
            libdlfcn-dev \
            make \
            gcc

      - name: 🔧 Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install flex bison libffi make

      - name: 🔨 Build Goscript
        run: |
          make clean
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: ✅ Test Goscript
        run: |
          ./gd --version
          ./gd test.gjs || echo "No test file found"

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            gd
            lib/
            src/
            goscript.toml

  # ============================================
  # JOB 2: Tests Goscript
  # ============================================
  test:
    name: Test Goscript
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: goscript-linux
          path: ./bin

      - name: 🔧 Setup Goscript
        run: |
          chmod +x ./bin/gd
          echo "$PWD/bin" >> $GITHUB_PATH
          ./bin/gd --version

      - name: 🧪 Run unit tests
        run: |
          if [ -d "tests" ]; then
            for test in tests/*.gjs; do
              echo "Running $test..."
              ./bin/gd "$test"
            done
          else
            echo "No tests directory found"
          fi

      - name: 📊 Generate test report
        run: |
          echo "# Goscript Test Report" > test-report.md
          echo "## Test Results" >> test-report.md
          echo "- Build: ✅ Success" >> test-report.md
          echo "- Version: $GOSCRIPT_VERSION" >> test-report.md
          echo "- Date: $(date)" >> test-report.md

      - name: 📤 Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.md

  # ============================================
  # JOB 3: Test genv (Goscript Environment Manager)
  # ============================================
  test-genv:
    name: Test genv
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install genv
        run: |
          if [ -f "genv" ]; then
            chmod +x genv
            ./genv --version
          fi

      - name: 🧪 Test genv create
        run: |
          ./genv create testenv
          ls -la ~/.genv/envs/testenv/

      - name: 🧪 Test genv activate
        run: |
          source ~/.genv/envs/testenv/bin/activate
          echo "GENV_ENV: $GENV_ENV"

  # ============================================
  # JOB 4: Analyse de code
  # ============================================
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Lint Goscript files
        run: |
          echo "Linting .gjs files..."
          find . -name "*.gjs" -type f | while read file; do
            echo "Checking: $file"
            # Basic syntax check
            grep -n "fn " "$file" | head -5 || true
          done

      - name: 📏 Count lines of code
        run: |
          echo "## Code Statistics" >> code-stats.md
          echo "\`\`\`" >> code-stats.md
          cloc . --exclude-dir=.git,node_modules --quiet || echo "cloc not installed"
          echo "\`\`\`" >> code-stats.md

      - name: 📤 Upload stats
        uses: actions/upload-artifact@v4
        with:
          name: code-stats
          path: code-stats.md

  # ============================================
  # JOB 5: Release (seulement sur tag)
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📦 Package artifacts
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            tar -czf "../release/${dir%/}.tar.gz" "$dir"
          done
          ls -la release/

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Goscript ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            release/*.tar.gz
            goscript.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
