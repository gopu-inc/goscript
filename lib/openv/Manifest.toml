# Manifest.toml
# Généré pour OPENV Framework

[metadata]
name = "openv"
version = "0.1.0"
release = "r0"
arch = "x86_64"
description = "OPENV Framework - Environment variable manager for Goscript"
author = "Mauricio-100 <ceoseshell@gmail.com>"
license = "MIT"
homepage = "https://github.com/gopu-inc/openv"
